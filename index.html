        body.light {

            /**
             * Implements exponential backoff for API calls to handle network issues gracefully.
             * @param {string} url - The API endpoint URL.
             * @param {object} payload - The request body payload.
             * @param {object} options - The fetch options.
             * @param {number} maxRetries - Maximum number of retries.
             * @param {number} delay - Initial delay in milliseconds.
             * @returns {Promise<object>} The JSON response from the API.
             */
            async function makeApiCallWithRetry(url, payload, options, maxRetries = 5, delay = 1000) {
                for (let i = 0; i < maxRetries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (response.ok) {
                            return await response.json();
                        } else if (response.status === 403) { // Specific check for 403 Forbidden error
                            throw new Error('API key is invalid or missing. Please provide a valid API key.');
                        } else if (response.status === 429) { // Too Many Requests
                            console.warn(`Retry attempt ${i + 1}: Received 429 status. Retrying in ${delay}ms...`);
                            await new Promise(resolve => setTimeout(resolve, delay));
                            delay *= 2; // Exponential increase
                        } else {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                    } catch (error) {
                        console.error(`API call failed on attempt ${i + 1}:`, error);
                        if (i === maxRetries - 1) {
                            throw error; // Re-throw the error after max retries
                        }
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2; // Exponential increase
                    }
                }
            }

            // Splash Screen Logic
            setTimeout(() => {
                splashScreen.classList.add('fade-out');

            // Handle button clicks with event delegation
            document.addEventListener('click', async (event) => {
                const targetId = event.target.closest('button')?.id;

                if (targetId === 'get-answer-btn') {
                    const promptText = questionInput.value.trim();
                    const selectedSubject = subjectSelect.value;
                    const selectedLanguage = languageSelect.value;

                    if (promptText === '' && !base64Image) {
                        answerOutput.innerHTML = '<p class="text-red-500">Please enter a question or upload an image.</p>';
                        return;
                    }

                    // Construct prompt based on subject and language
                    let fullPrompt = `Answer the following ${selectedSubject} question in ${selectedLanguage}. Be concise and clear.`;
                    if (selectedSubject === 'Mathematics') {
                        fullPrompt = `Provide a simple, step-by-step explanation for the following math problem in plain text. Do not use any special characters or LaTeX formatting. The question is:`;
                    }
                    fullPrompt += `\nQuestion: ${promptText}`;

                    // UI feedback for loading state
                    getAnswerBtn.disabled = true;
                    getAnswerBtn.textContent = 'Thinking...';
                    loadingSpinner.classList.remove('hidden');
                    answerOutput.innerHTML = '';

                    try {
                        let parts = [{ text: fullPrompt }];
                        if (base64Image) {
                            parts.push({
                                inlineData: {
                                    mimeType: imageInput.files[0].type,
                                    data: base64Image
                                }
                            });
                        }
                        
                        const payload = {
                            contents: [{ role: "user", parts: parts }]
                        };
                        const options = {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        };

                        const result = await makeApiCallWithRetry(textModelUrl, payload, options);
                        
                        if (result?.candidates?.[0]?.content?.parts?.[0]?.text) {
                            const text = result.candidates[0].content.parts[0].text;
                            answerOutput.innerHTML = `
                                <pre id="answer-text" class="whitespace-pre-wrap font-sans">${text}</pre>
                                <div class="flex justify-end mt-4 gap-2">
                                    <button id="copy-answer-btn" class="bg-purple-500 hover:bg-purple-600 text-white font-semibold py-2 px-4 rounded-full transition duration-300 flex items-center glow-purple-hover">
                                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-2M8 5a2 2 0 012-2h4a2 2 0 012 2m-4 0v2m-4-2H8m4 2v2m0 0a2 2 0 01-2 2H8a2 2 0 01-2-2m2 0h4m-4 0v4m0 0H6a2 2 0 00-2 2v1m12-1v-2m0 0h2a2 2 0 012 2v2m0 0a2 2 0 01-2 2H8a2 2 0 01-2-2m2-2v2m4 2v-2m0 0h2a2 2 0 002-2v-2m0 0h-4M8 10h.01M12 10h.01M16 10h.01"/>
                                        </svg>
                                        Copy Answer
                                    </button>
                                    <button id="read-answer-btn" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-full transition duration-300 flex items-center glow-green-hover">
                                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.5-10.607a9 9 0 010 12.728m2.5-16.273a13 13 0 010 18.384M8 10h.01M12 10h.01M16 10h.01M7 4h10a3 3 0 013 3v10a3 3 0 01-3 3H7a3 3 0 01-3-3V7a3 3 0 013-3z"></path>
                                        </svg>
                                        Read Answer
                                    </button>
                                </div>
                            `;
                        } else {
                            answerOutput.innerHTML = '<p class="text-red-500">Sorry, I could not generate an answer. The API response was invalid. Please try again.</p>';
                        }

                    } catch (error) {
                        console.error("Text API Call failed:", error);
                        answerOutput.innerHTML = `<p class="text-red-500">An error occurred. Please check your internet connection and try again. Error: ${error.message}</p>`;
                    } finally {
                        getAnswerBtn.disabled = false;
                        getAnswerBtn.textContent = 'Get Answer';
                        loadingSpinner.classList.add('hidden');
                    }
                } else if (targetId === 'copy-answer-btn') {
                    const textToCopy = document.getElementById('answer-text')?.textContent || '';
                    if (textToCopy) {
                        const tempInput = document.createElement('textarea');
                        tempInput.value = textToCopy;
                        document.body.appendChild(tempInput);
                        tempInput.select();
                        document.execCommand('copy');
                        document.body.removeChild(tempInput);
                        
                        const copyBtn = document.getElementById('copy-answer-btn');
                        const originalHtml = copyBtn.innerHTML;
                        copyBtn.textContent = 'Copied!';
                        setTimeout(() => {
                            copyBtn.innerHTML = originalHtml;
                        }, 2000);
                    }
                } else if (targetId === 'read-answer-btn') {
                    const readAnswerBtn = document.getElementById('read-answer-btn');
                    const textToSpeak = document.getElementById('answer-text')?.textContent || '';
                    const selectedVoice = voiceSelect.value;
                    
                    if (!textToSpeak) {
                        answerOutput.innerHTML += '<p class="text-red-500 mt-4">No text to read.</p>';
                        return;
                    }

                    // Show loading state and disable button
                    readAnswerBtn.disabled = true;
                    const originalHtml = readAnswerBtn.innerHTML;
                    readAnswerBtn.innerHTML = `
                        <svg class="animate-spin h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Loading...`;

                    // Stop any previous audio playback
                    if (audioSource) {
                        audioSource.stop();
                        audioSource = null;
                    }
                    if (audioContext && audioContext.state === 'running') {
                        audioContext.close().then(() => audioContext = null);
                    }
                    
                    try {
                        const payload = {
                            contents: [{ parts: [{ text: textToSpeak }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: { 
                                        prebuiltVoiceConfig: { voiceName: selectedVoice }
                                    }
                                }
                            },
                            model: "gemini-2.5-flash-preview-tts"
                        };
                        const options = {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        };

                        const result = await makeApiCallWithRetry(ttsModelUrl, payload, options);
                        
                        const part = result?.candidates?.[0]?.content?.parts?.[0];
                        const audioData = part?.inlineData?.data;

                        if (audioData) {
                            // Ensure AudioContext is ready
                            if (!audioContext) {
                                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                            }
                            
                            // Decode the base64 PCM data
                            const pcmData = base64ToByteArray(audioData);
                            const pcm16Data = new Int16Array(pcmData.buffer);

                            // Create a new AudioBuffer with the correct sample rate
                            const audioBuffer = audioContext.createBuffer(1, pcm16Data.length, audioContext.sampleRate);
                            const bufferChannel = audioBuffer.getChannelData(0);
                            for (let i = 0; i < pcm16Data.length; i++) {
                                bufferChannel[i] = pcm16Data[i] / 32768; // Normalize to -1.0 to 1.0
                            }

                            // Create and play the audio source
                            audioSource = audioContext.createBufferSource();
                            audioSource.buffer = audioBuffer;
                            audioSource.connect(audioContext.destination);
                            audioSource.start();

                            // Reset button state when playback ends
                            audioSource.onended = () => {
                                readAnswerBtn.disabled = false;
                                readAnswerBtn.innerHTML = originalHtml;
                                audioSource = null;
                            };

                        } else {
                            answerOutput.innerHTML += '<p class="text-red-500 mt-4">Could not generate audio from the API response. Please try again with a different voice.</p>';
                            readAnswerBtn.disabled = false;
                            readAnswerBtn.innerHTML = originalHtml;
                        }
                    } catch (error) {
                        console.error("TTS API Call failed:", error);
                        answerOutput.innerHTML += `<p class="text-red-500 mt-4">An error occurred during audio generation. Error: ${error.message}</p>`;
                        readAnswerBtn.disabled = false;
                        readAnswerBtn.innerHTML = originalHtml;
                    }
                }
            });

            /**
             * Converts a base64 string to a Uint8Array.
             * @param {string} base64 - The base64 string.
             * @returns {Uint8Array} The byte array.
             */
            function base64ToByteArray(base64) {
                const binaryString = window.atob(base64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                return bytes;
            }
        });
    </script>
